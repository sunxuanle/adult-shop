<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>支付成功</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        
        .success-container {
            display: flex; flex-direction: column;
            align-items: center; padding: 60px 20px;
        }
        
        .success-icon {
            width: 120px; height: 120px;
            background: linear-gradient(135deg, #4caf50 0%, #8bc34a 100%);
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            margin-bottom: 30px;
            animation: bounce 0.6s;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        .success-icon span { font-size: 60px; }
        
        .success-title {
            font-size: 24px; font-weight: 600;
            color: #333; margin-bottom: 10px;
        }
        
        .success-desc {
            font-size: 14px; color: #666;
            text-align: center; margin-bottom: 30px;
        }
        
        .order-card {
            width: 100%; max-width: 350px;
            background: white; border-radius: 12px;
            padding: 20px; margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .order-info {
            display: flex; justify-content: space-between;
            margin-bottom: 15px; font-size: 14px;
        }
        .order-info:last-child { margin-bottom: 0; }
        .order-label { color: #999; }
        .order-value { color: #333; font-weight: 600; }
        .order-value.highlight { color: #e91e63; }
        
        .action-btns {
            width: 100%; max-width: 350px;
            display: flex; flex-direction: column; gap: 15px;
        }
        
        .action-btn {
            padding: 15px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #f5f5f5; color: #666;
        }
        
        .pickup-section {
            width: 100%; max-width: 350px;
            background: #fff5f7; border-radius: 12px;
            padding: 20px; margin-top: 20px;
        }
        
        .pickup-title {
            font-size: 16px; font-weight: 600;
            color: #e91e63; margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px;
        }
        
        .pickup-step {
            display: flex; gap: 15px; margin-bottom: 15px;
        }
        .pickup-step:last-child { margin-bottom: 0; }
        .step-num {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, #e91e63 0%, #9c27b0 100%);
            border-radius: 50%; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600;
            flex-shrink: 0;
        }
        .step-text { font-size: 14px; color: #666; line-height: 1.5; }
        
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px; text-align: center;
            font-size: 12px; color: #999;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">
            <span>✓</span>
        </div>
        
        <h1 class="success-title">支付成功</h1>
        <p class="success-desc">您的订单已提交成功，骑手正在赶来</p>
        
        <div class="order-card">
            <div class="order-info">
                <span class="order-label">订单编号</span>
                <span class="order-value" id="orderId">--</span>
            </div>
            <div class="order-info">
                <span class="order-label">支付方式</span>
                <span class="order-value">微信支付</span>
            </div>
            <div class="order-info">
                <span class="order-label">支付金额</span>
                <span class="order-value highlight" id="payAmount">¥0.00</span>
            </div>
            <div class="order-info">
                <span class="order-label">下单时间</span>
                <span class="order-value" id="orderTime">--</span>
            </div>
        </div>
        
        <div class="pickup-section">
            <div class="pickup-title">
                <span>🛵</span> 配送流程
            </div>
            <div class="pickup-step">
                <div class="step-num">1</div>
                <div class="step-text">骑手已接单，正在准备商品</div>
            </div>
            <div class="pickup-step">
                <div class="step-num">2</div>
                <div class="step-text">骑手取货后将尽快送达</div>
            </div>
            <div class="pickup-step">
                <div class="step-num">3</div>
                <div class="step-text">商品采用私密包装，保护您的隐私</div>
            </div>
            <div class="pickup-step">
                <div class="step-num">4</div>
                <div class="step-text">预计30-60分钟内送达</div>
            </div>
        </div>
        
        <div class="action-btns">
            <button class="action-btn btn-primary" onclick="goHome()">继续购物</button>
            <button class="action-btn btn-secondary" onclick="goOrders()">查看订单</button>
        </div>
        
        <div class="footer">
            如有问题请联系客服：400-888-8888
        </div>
    </div>

    <script>
        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }
        
        function loadOrderInfo() {
            const orderId = getUrlParam('id') || 'ORD' + Date.now().toString(36).toUpperCase();
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric', month: '2-digit', day: '2-digit',
                hour: '2-digit', minute: '2-digit'
            });
            
            document.getElementById('orderId').textContent = orderId;
            document.getElementById('orderTime').textContent = timeStr;
        }
        
        function goHome() {
            window.location.href = 'index.html';
        }
        
        function goOrders() {
            window.location.href = 'profile.html';
        }
        
        loadOrderInfo();
    </script>
</body>
</html>
